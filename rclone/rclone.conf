# ─────────────────────────────────────────────────────────────
#  rclone config for Zurg WebDAV mount
#
#  This file is mounted read-only into the rclone container.
#  No changes needed here — the URL points to the zurg container
#  over the Docker internal network.
#
#  The rclone container will mount zurg:/torrents at /mnt/zurg,
#  which is then shared into the backend container as a volume.
# ─────────────────────────────────────────────────────────────

[zurg]
type = webdav
url = http://zurg:9999/dav
vendor = other
pacer_min_sleep = 0
